# openenv.yaml — OpenEnv manifest
# Cross-file reference: describes the contract implemented by app.py,
# models.py, environment.py, graders.py, tasks.py, and inference.py.

name: support-triage-openenv
version: "1.0.0"
description: >
  A customer-support triage RL environment.
  The agent reads support tickets, classifies urgency, routes to the correct team,
  requests clarification when needed, and produces a short resolution response.

tasks:
  - id: easy
    description: Clean ticket with obvious routing (password reset -> account_support, low urgency).
  - id: medium
    description: Incomplete billing complaint requiring one clarification before correct routing.
  - id: hard
    description: Multi-issue enterprise ticket requiring prioritisation, escalation, and compliance-safe wording.

models:
  action:
    schema: TriageAction
    fields:
      - name: chosen_team
        type: "Literal['account_support','billing','technical_support','trust_safety']"
      - name: urgency
        type: "Literal['low','medium','high']"
      - name: ask_clarification
        type: bool
      - name: response_text
        type: str

  observation:
    schema: TicketObservation
    fields:
      - name: task_id
        type: str
      - name: ticket_text
        type: str
      - name: customer_tier
        type: str
      - name: allowed_teams
        type: "list[str]"
      - name: progress_hint
        type: str
      - name: reward
        type: float
      - name: done
        type: bool
      - name: feedback
        type: str

  state:
    schema: TicketState
    fields:
      - name: episode_id
        type: str
      - name: step_count
        type: int
      - name: task_id
        type: str
      - name: clarification_requested
        type: bool
      - name: resolved
        type: bool
      - name: cumulative_reward
        type: float

api:
  base_path: /
  endpoints:
    - method: GET
      path: /
      description: Health check.
    - method: POST
      path: /reset
      description: Start a new episode and return the first observation.
    - method: POST
      path: /step
      description: Submit one TriageAction and receive observation, reward, and done.
    - method: GET
      path: /state
      description: Return the current TicketState for an episode.
    - method: GET
      path: /tasks
      description: Return available tasks and their metadata.

runtime:
  max_steps: 5
  reward_range: [0.0, 1.0]
  done_when:
    - reward >= 0.8
    - step_count >= max_steps

scoring:
  function: grade_action
  file: graders.py
  returns:
    - score
    - feedback
  rubric:
    correct_team: 0.20
    correct_urgency: 0.20
    clarification_behavior: 0.20
    required_keywords_present: 0.20
    concise_nonempty_response: 0.20

implementation:
  server: app.py
  environment: environment.py
  models: models.py
  tasks: tasks.py
  grader: graders.py
  baseline_agent: inference.py
