version: "3.9"

services:
  env_server:
    build: .
    container_name: support-triage-env
    ports:
      - "7860:7860"
    environment:
      PORT: 7860
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  validator:
    build: .
    container_name: support-triage-validator
    depends_on:
      env_server:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
    command: ["python", "tests/validate_local.py", "--base-url", "http://env_server:7860"]

  agent:
    build: .
    container_name: support-triage-agent
    profiles: ["agent"]
    depends_on:
      env_server:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      BASE_URL: http://env_server:7860
    command: ["python", "inference.py"]
